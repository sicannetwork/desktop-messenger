name: Build MessengerDesk Windows Installer

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    name: Build & Package (Windows)
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install all dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Type-check ────────────────────────────────────────────────────────
      - name: Type check (renderer)
        run: npx tsc --noEmit

      - name: Type check (electron main)
        run: npx tsc -p tsconfig.electron.json --noEmit

      # ── 5. Build renderer (Vite) ─────────────────────────────────────────────
      - name: Build renderer (Vite)
        run: npm run build:vite

      # ── 6. Compile Electron main process (TypeScript → CommonJS) ─────────────
      - name: Compile Electron main process
        run: npm run build:electron

      # ── 7. Generate placeholder icons if real assets are missing ─────────────
      #    Remove this step once you add real .ico files to assets/
      - name: Generate placeholder icons (dev fallback)
        shell: pwsh
        run: |
          $assetsDir = "assets"
          if (-not (Test-Path $assetsDir)) { New-Item -ItemType Directory -Path $assetsDir }

          $icons = @("icon.ico", "tray.ico", "tray-badge.ico")
          foreach ($icon in $icons) {
            $path = Join-Path $assetsDir $icon
            if (-not (Test-Path $path)) {
              Write-Host "Generating placeholder: $icon"
              # 1x1 pixel valid ICO (binary)
              $icoBytes = [System.Convert]::FromBase64String(
                "AAABAAEAEBAAAAEAIABoBAAAFgAAACgAAAAQAAAAIAAAAAEAIAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" +
                "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" +
                "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" +
                "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA" +
                "AAAAAAAAAAAAAAAAAAAA"
              )
              [System.IO.File]::WriteAllBytes($path, $icoBytes)
            } else {
              Write-Host "Found existing: $icon"
            }
          }

      # ── 8. Package with Electron Builder ─────────────────────────────────────
      - name: Package — NSIS installer + portable EXE
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing (optional — uncomment when you have a cert):
          # WIN_CERT_FILE: ${{ secrets.WIN_CERT_FILE }}
          # WIN_CERT_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}
          # CSC_LINK: ${{ secrets.WIN_CERT_FILE }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CERT_PASSWORD }}

      # ── 9. List release artifacts ─────────────────────────────────────────────
      - name: List build output
        shell: pwsh
        run: |
          Write-Host "=== release/ contents ==="
          Get-ChildItem -Path release -Recurse -File |
            Select-Object Name, @{N="Size (MB)";E={[math]::Round($_.Length/1MB,2)}} |
            Format-Table -AutoSize

      # ── 10. Upload artifacts to GitHub Actions ────────────────────────────────
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: MessengerDesk-Setup-${{ github.ref_name }}
          path: release/*-Setup.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: MessengerDesk-Portable-${{ github.ref_name }}
          path: release/*-portable.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload latest.yml (auto-updater manifest)
        uses: actions/upload-artifact@v4
        with:
          name: MessengerDesk-UpdateManifest-${{ github.ref_name }}
          path: release/latest.yml
          if-no-files-found: ignore
          retention-days: 30

  # ── Release job: runs only on version tags (v*) ─────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh dist-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MessengerDesk ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
          files: |
            dist-artifacts/*-Setup.exe
            dist-artifacts/*-portable.exe
            dist-artifacts/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
